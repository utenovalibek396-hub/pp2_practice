<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALI EDUCATION</title>
    <link rel="stylesheet" href="a.css">
    <link rel="icon" type="image/x-icon" href="ava.png">
</head>
<body>
    <header>
        <h1 class="title">Қош келдіңіз!</h1>
        <p class="subtitle">Кіру немесе тіркелу үшін таңдаңыз ✨</p>
    </header>

    <main>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Кіру</button>
            <p class="switch-text">
                Жаңа қолданушы? <a href="#" id="showRegister" class ="PP">Тіркелу</a>
            </p>
        </form>
        <form id="registerForm" style="display: none;">
            <input type="text" id="name" placeholder="Атыңыз" required>
            <input type="email" id="emailReg" placeholder="Email" required>
            <input type="password" id="passwordReg" placeholder="Пароль" required>
            <button type="submit">Тіркелу</button>
            <p class="switch-text">
                Бұрын тіркелдіңіз бе? <a href="#" id="showLogin" class ="PP">Кіру</a>
            </p>
        </form>

        <p id="message"></p>
    </main>

    <footer>
        <p>&copy; 2026 ins: utenov_ali</p>
    </footer>

    <script>
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");
        const showRegister = document.getElementById("showRegister");
        const showLogin = document.getElementById("showLogin");
        const message = document.getElementById("message");

        showRegister.addEventListener("click", (e) => {
            e.preventDefault();
            loginForm.style.display = "none";
            registerForm.style.display = "flex";
            message.textContent = "";
        });


        showLogin.addEventListener("click", (e) => {
            e.preventDefault();
            registerForm.style.display = "none";
            loginForm.style.display = "flex";
            message.textContent = "";
        });

        registerForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const name = document.getElementById("name").value;
            const email = document.getElementById("emailReg").value;
            const password = document.getElementById("passwordReg").value;

            const user = { name, email, password };
            localStorage.setItem(email, JSON.stringify(user));

            message.textContent = "Сіз сәтті тіркелдіңіз! 🎉";
            message.style.color = "#2ec4b6";

            registerForm.reset();
        });

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            const storedUser = localStorage.getItem(email);

            if(storedUser){
                const user = JSON.parse(storedUser);
                if(user.password === password){
                    message.textContent = `Кіру сәтті өтті! Қош келдіңіз, ${user.name} 🎉`;
                    message.style.color = "#2ec4b6";
                } else {
                    message.textContent = "Пароль дұрыс емес ❌";
                    message.style.color = "#ff6b6b";
                }
            } else {
                message.textContent = "Email табылмады ❌";
                message.style.color = "#ff6b6b";
            }
        });
    </script>
</body>
</html>
